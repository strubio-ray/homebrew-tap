name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: macos-latest
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap this repository
        run: brew tap strubio-ray/quicklook "$GITHUB_WORKSPACE"

      - name: Audit casks
        run: brew audit --cask --tap strubio-ray/quicklook

      - name: Style check
        run: brew style --cask Casks/*.rb

      - name: Livecheck
        run: brew livecheck --tap strubio-ray/quicklook
