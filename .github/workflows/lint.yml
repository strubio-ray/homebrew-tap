name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master
        with:
          token: ${{ github.token }}

      - name: Audit formulas
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: brew audit --formula --tap strubio-ray/tap

      - name: Audit casks
        run: brew audit --cask --tap strubio-ray/tap

      - name: Style check
        run: brew style strubio-ray/tap

      - name: Livecheck (casks)
        run: brew livecheck --cask --tap strubio-ray/tap
