name: Bump casks

on:
  schedule:
    - cron: "0 9 1 * *"  # 1st of every month at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master
        with:
          token: ${{ github.token }}

      - name: Audit casks
        run: brew audit --cask --tap strubio-ray/tap

      - name: Style check
        run: brew style --cask strubio-ray/tap/syntax-highlight strubio-ray/tap/qlmarkdown

      - name: Bump outdated casks (write-only)
        run: |
          outdated=$(brew livecheck --tap strubio-ray/tap --json | jq -r '.[] | select(.version.outdated == true) | .cask')
          if [ -z "$outdated" ]; then
            echo "All casks are up to date."
            exit 0
          fi
          for cask in $outdated; do
            echo "Bumping $cask..."
            brew bump-cask-pr --write-only --no-audit --no-style "strubio-ray/tap/$cask"
          done

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: bump cask versions"
          branch: auto-bump-casks
          title: "Bump cask versions"
          body: |
            Automated monthly version bump detected by `brew livecheck`.

            Verify the updated versions and SHA256 hashes before merging.
          delete-branch: true
