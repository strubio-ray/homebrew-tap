name: Bump casks

on:
  schedule:
    - cron: "0 9 1 * *"  # 1st of every month at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master
        with:
          token: ${{ github.token }}

      - name: Audit casks
        run: brew audit --cask --tap strubio-ray/quicklook

      - name: Style check
        run: brew style --cask Casks/*.rb

      - name: Bump outdated casks (write-only)
        run: |
          for cask in syntax-highlight qlmarkdown; do
            brew bump-cask-pr --write-only --no-audit --no-style strubio-ray/quicklook/"$cask" || true
          done

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: bump cask versions"
          branch: auto-bump-casks
          title: "Bump cask versions"
          body: |
            Automated monthly version bump detected by `brew livecheck`.

            Verify the updated versions and SHA256 hashes before merging.
          delete-branch: true
