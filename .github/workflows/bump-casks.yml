name: Bump casks

on:
  schedule:
    - cron: "0 9 1 * *"  # 1st of every month at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap this repository
        run: brew tap strubio-ray/quicklook "$GITHUB_WORKSPACE"

      - name: Audit casks
        run: brew audit --cask --tap strubio-ray/quicklook

      - name: Style check
        run: brew style --cask Casks/*.rb

      - name: Bump outdated casks
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for cask in syntax-highlight qlmarkdown; do
            brew bump-cask-pr --no-browse strubio-ray/quicklook/"$cask" || true
          done
